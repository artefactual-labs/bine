name: Release

on:
  workflow_dispatch:
    inputs:
      publish_minor:
        description: Publish the next minor release from the highest published version.
        required: false
        type: boolean
        default: false
      publish_patch:
        description: Publish the next patch release from the highest published version.
        required: false
        type: boolean
        default: false
      version:
        description: Publish an exact semantic version, for example v1.2.3.
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve release version
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUT_PUBLISH_MINOR: ${{ inputs.publish_minor }}
          INPUT_PUBLISH_PATCH: ${{ inputs.publish_patch }}
          INPUT_VERSION: ${{ inputs.version }}
        run: ./.github/scripts/resolve-release-version.sh
      - name: Create local release tag
        run: git tag "${{ steps.release.outputs.version }}"
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - name: Install Syft
        id: install-syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Add Syft to PATH
        run: echo "$(dirname "${{ steps.install-syft.outputs.cmd }}")" >> "$GITHUB_PATH"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
